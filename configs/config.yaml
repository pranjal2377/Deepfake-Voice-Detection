audio:
  sample_rate: 16000
  frame_duration: 2.0
  hop_duration: 0.5
  channels: 1
  dtype: float32
features:
  n_mfcc: 40
  n_mels: 128
  n_fft: 2048
  hop_length: 512
  fmax: 8000
model:
  architecture: cnn
  confidence_threshold: 0.5
  input_length: 2.0
  batch_size: 32
  learning_rate: 0.001
  epochs: 50
  early_stopping_patience: 7
risk:
  high_risk_threshold: 0.7
  medium_risk_threshold: 0.4
  aggregation_window: 5
  smoothing_factor: 0.3
paths:
  raw_data: data/raw
  processed_data: data/processed
  test_data: data/test
  models: models
  deepfake_model: models/deepfake_model.pt
  results: results
  docs: docs
dataset:
  train_path: data/raw/training
  test_path: data/raw/testing
  scam_dataset: data/raw/scam_transcripts.csv
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  augment_train: true
  augment_prob: 0.5
logging:
  enable_logs: true
  log_path: logs/call_analysis.json
ui:
  theme: dark
  refresh_rate: 0.5
nlp:
  bert_model_name: distilbert-base-uncased
  confidence_threshold: 0.5
  device: cpu
